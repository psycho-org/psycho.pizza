name: CI/CD.yml
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  SERVICE_NAME: psycho.pizza
  DEPLOYMENT_GROUP_NAME: psycho-deployment-group

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew clean test

      - name: Print test failure details
        if: failure()
        run: |
          echo "=== TEST RESULT XML FILES ==="
          find build/test-results/test -name "*.xml" -print || true
          echo "=== FAILED TEST DETAILS ==="
          grep -RIn "<failure\\|<error" build/test-results/test || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/test-results/test/**
            build/reports/tests/test/**

      - name: Build JAR (verify only)
        run: ./gradlew bootJar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: ap-northeast-2

      - name: Create CodeDeploy deployment
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name ${{ env.SERVICE_NAME }} \
            --deployment-group-name ${{ env.DEPLOYMENT_GROUP_NAME }} \
            --github-location repository=${{ github.repository }},commitId=${{ github.sha }} \
            --description "Deploy ${{ github.sha }} from ${{ github.ref_name }}" \
            --query 'deploymentId' \
            --output text)
          echo "Deployment ID: $DEPLOYMENT_ID"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Wait for deployment to complete
        run: |
          aws deploy wait deployment-successful \
            --deployment-id $DEPLOYMENT_ID

      - name: Get deployment result
        if: always()
        run: |
          aws deploy get-deployment \
            --deployment-id $DEPLOYMENT_ID \
            --query 'deploymentInfo.{Status:status,Description:description}' \
            --output table
