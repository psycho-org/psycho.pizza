name: CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check Kotlin formatting
        run: ./gradlew ktlintCheck

      - name: Test
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew clean test

      - name: Print test failure details
        if: failure()
        run: |
          echo "=== TEST RESULT XML FILES ==="
          find build/test-results/test -name "*.xml" -print || true
          echo "=== FAILED TEST DETAILS ==="
          grep -RIn "<failure\\|<error" build/test-results/test || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          retention-days: 1
          path: |
            build/test-results/test/*.xml
            build/reports/tests/test/**
            build/reports/ktlint/**

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew bootJar

      - name: Prepare deployment bundle
        run: |
          mkdir -p deploy
          cp build/libs/*.jar deploy/
          cp appspec.yml deploy/
          cp -r scripts deploy/
          cd deploy && zip -r ../psycho-pizza-${{ github.sha }}.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: ap-northeast-2

      - name: Upload to S3
        run: |
          aws s3 cp psycho-pizza-${{ github.sha }}.zip \
            s3://psycho-deploy-artifacts-prod/psycho-pizza-${{ github.sha }}.zip

      - name: Create CodeDeploy deployment
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name psycho-codedeploy-app-prod \
            --deployment-group-name psycho-codedeploy-dg-prod \
            --s3-location bucket=psycho-deploy-artifacts-prod,key=psycho-pizza-${{ github.sha }}.zip,bundleType=zip \
            --description "Deploy ${{ github.sha }} from ${{ github.ref_name }}" \
            --query 'deploymentId' \
            --output text)
          echo "Deployment ID: $DEPLOYMENT_ID"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Wait for deployment to complete
        run: |
          aws deploy wait deployment-successful \
            --deployment-id $DEPLOYMENT_ID

      - name: Get deployment result
        if: always()
        run: |
          aws deploy get-deployment \
            --deployment-id $DEPLOYMENT_ID \
            --query 'deploymentInfo.{Status:status,Description:description}' \
            --output table
