spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    default: ${SPRING_PROFILES_ACTIVE}
  flyway:
    placeholder-replacement: false

management:
  endpoints:
    web:
      exposure:
        include: health

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4.1-mini

mail:
  token:
    verify-base-url: http://localhost:8080/api/v1/mails/verify
    verify-success-url: http://localhost:8080/mail/verify-success.html
    verify-failure-url: http://localhost:8080/mail/verify-failure.html